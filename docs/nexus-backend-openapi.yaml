openapi: "3.1.0"
info:
  title: Nexus Backend API
  version: "1.0.0"
  description: |
    API contract between the Nexus CLI (aider fork) and the Nexus FastAPI backend.

    The backend serves as a middleware that:
    1. Routes LLM requests through the internal Lumin8 gateway
    2. Injects product-specific context (SKILLS.md, Confluence, code standards) into every request
    3. Stores and retrieves developer knowledge via the AgentOverflow system

    Every CLI request carries an `X-Nexus-Skill` header identifying the active product context.
    No username/password authentication is required — the service runs inside the internal network
    and relies on a service-account token configured at deployment time (not sent by the CLI).

    **CRITICAL**: The backend MUST NOT overwrite the first system message in the messages array.
    That message contains aider's SEARCH/REPLACE format rules. The backend MUST APPEND its
    RAG context as additional messages AFTER the first system message.

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /v1/chat/completions:
    post:
      summary: OpenAI-compatible chat completions (main LLM endpoint)
      description: |
        Standard OpenAI ChatCompletions endpoint with SSE streaming support.

        **Headers**:
        - `X-Nexus-Skill`: Active product context (e.g., "staking"). Backend uses this
          to load the corresponding SKILLS.md and inject Confluence/code context.

        **CRITICAL - Message Handling**:
        The `messages` array will contain aider's system prompt as the FIRST message.
        This system prompt includes SEARCH/REPLACE block format rules that the LLM MUST follow.

        The backend MUST:
        1. Preserve messages[0] (aider's system prompt with edit format rules) UNCHANGED
        2. APPEND product context (SKILLS.md, Confluence chunks, code standards) as additional
           system messages AFTER messages[0] but BEFORE user messages
        3. Forward the augmented messages to the LLM via Lumin8
        4. Ensure the LLM response uses SEARCH/REPLACE block format for file edits

        **Streaming**: Must use standard OpenAI SSE format.
      parameters:
        - name: X-Nexus-Skill
          in: header
          required: true
          schema:
            type: string
          description: Active product/skill context name (e.g., "staking", "payments")
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - messages
              properties:
                model:
                  type: string
                  example: "nexus-agent"
                  description: Will always be "nexus-agent" from the CLI
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                  description: |
                    Message array. First message is always the system prompt with
                    SEARCH/REPLACE format rules. DO NOT MODIFY IT.
                stream:
                  type: boolean
                  default: true
                temperature:
                  type: number
                  default: 0
            example:
              model: "nexus-agent"
              stream: true
              temperature: 0
              messages:
                - role: "system"
                  content: "Act as an expert software developer. Always use best practices... [SEARCH/REPLACE rules here - DO NOT MODIFY]"
                - role: "user"
                  content: "I have added these files to the chat: main.py\n\nFix the authentication bug in the login handler"
      responses:
        "200":
          description: SSE stream of completion chunks
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                data: {"id":"chatcmpl-abc","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":"Here"},"finish_reason":null}]}

                data: {"id":"chatcmpl-abc","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":" is"},"finish_reason":null}]}

                data: [DONE]

  /api/skills:
    get:
      summary: List all available product skills/contexts
      description: |
        Returns all available skills that the CLI can auto-detect or the user can select.
        Each skill represents a product context (e.g., "staking", "payments") with associated
        keywords for auto-matching against repository metadata.
      responses:
        "200":
          description: List of available skills
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      example: "staking"
                    description:
                      type: string
                      example: "Staking product - validator management and delegation"
                    keywords:
                      type: array
                      items:
                        type: string
                      example: ["stake", "validator", "delegation", "epoch"]
              example:
                - name: "staking"
                  description: "Staking product - validator management and delegation"
                  keywords: ["stake", "validator", "delegation", "epoch"]
                - name: "payments"
                  description: "Payments processing and settlement engine"
                  keywords: ["payment", "settlement", "transaction", "ledger"]

  /api/skills/{name}:
    get:
      summary: Get a specific skill's metadata and content
      description: |
        Returns a single skill's metadata. Used by the CLI to validate that a skill
        exists when the user types @skillname to switch context mid-session.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: "staking"
      responses:
        "200":
          description: Skill found
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                  skill_content:
                    type: string
                    description: Full markdown content of the SKILLS.md file
              example:
                name: "staking"
                description: "Staking product - validator management and delegation"
                skill_content: "# Staking Product Skills\n\n## Architecture\n..."
        "404":
          description: Skill not found

  /api/overflow/ingest:
    post:
      summary: Submit error/issue for AgentOverflow analysis
      description: |
        Receives an error description, git diff, and file context from the CLI's
        /solve command. The backend can analyze this to provide debugging suggestions
        or store it for team knowledge sharing.

        The response includes an `issue_id` that the CLI stores locally. When the developer
        finds the actual fix, they call `/solved <explanation>` which sends the `issue_id`
        plus the confirmed resolution to `/api/overflow/resolve`.
      parameters:
        - name: X-Nexus-Skill
          in: header
          required: false
          schema:
            type: string
          description: Active product context, used to scope the knowledge base lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
              properties:
                description:
                  type: string
                  description: User's description of the error/issue
                git_diff:
                  type: string
                  description: Output of `git diff --no-color` (unstaged changes)
                files_in_context:
                  type: array
                  items:
                    type: string
                  description: Relative paths of files currently in the aider chat context
            example:
              description: "Authentication middleware returns 403 after token refresh"
              git_diff: "diff --git a/auth.py b/auth.py\n..."
              files_in_context: ["src/auth.py", "src/middleware.py"]
      responses:
        "200":
          description: Issue ingested and queued for analysis
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - issue_id
                properties:
                  status:
                    type: string
                    example: "ingested"
                  issue_id:
                    type: string
                    format: uuid
                    description: |
                      Stable identifier for this issue record. The CLI stores this locally
                      so the developer can call /solved later to attach a confirmed resolution.
                  suggestion:
                    type: string
                    description: |
                      Optional immediate suggestion surfaced by similarity search against past
                      resolved issues. Empty string if no close match was found.
              example:
                status: "ingested"
                issue_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                suggestion: "This looks like a token expiry race condition. Check the refresh_token middleware order."

  /api/overflow/resolve:
    post:
      summary: Record the confirmed resolution for a previously submitted issue
      description: |
        Called by the CLI's `/solved` command after the developer has found the actual fix.

        **Flow**:
        1. Developer encounters an error, runs `/solve <description>` — CLI calls `/api/overflow/ingest`
        2. Backend returns `issue_id`; CLI stores it on the coder object
        3. Developer tries the suggestion (or finds their own fix)
        4. Developer runs `/solved <what actually fixed it>` — CLI calls `/api/overflow/resolve`
        5. Backend stores the confirmed `(issue, resolution)` pair in the knowledge base
        6. Future calls to `/api/overflow/ingest` with similar issues will retrieve this resolution

        **Storage**: Backend should embed both the issue description and resolution text using
        the same embedding model used for skill context, then store in the vector DB alongside
        the skill name. Retrieval at ingest-time surfaces the top-K similar past resolutions.
      parameters:
        - name: X-Nexus-Skill
          in: header
          required: false
          schema:
            type: string
          description: Product skill context (for scoping retrieval to the same product)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - issue_id
                - resolution
              properties:
                issue_id:
                  type: string
                  format: uuid
                  description: The issue_id returned by /api/overflow/ingest
                resolution:
                  type: string
                  description: |
                    Developer-written explanation of what actually fixed the issue.
                    Should be a plain-language description — no code required, but code
                    snippets are welcome and will be indexed.
            example:
              issue_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              resolution: "The token refresh middleware was running after the auth check. Moving it to run before the auth middleware in the middleware stack fixed the 403s."
      responses:
        "200":
          description: Resolution recorded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "resolved"
                  message:
                    type: string
                    description: Human-readable confirmation
              example:
                status: "resolved"
                message: "Resolution recorded. This fix will be surfaced for similar future issues."
        "404":
          description: issue_id not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
              example:
                detail: "Issue a1b2c3d4-... not found. It may have already been resolved or expired."

  /v1/models:
    get:
      summary: Health check and model listing
      description: |
        Returns available models. Used by the CLI at startup to verify the backend
        is reachable before entering the interactive session.
      responses:
        "200":
          description: Backend is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        object:
                          type: string
              example:
                data:
                  - id: "nexus-agent"
                    object: "model"
